<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>BALPRO LIFE | Chocolate Nutrition, Reimagined</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Fonts: Epilogue (headline), Plus Jakarta Sans (body), Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#2e150c",
              "tertiary": "#efbf70",
              "on-tertiary-fixed": "#281900",
              "surface-tint": "#e2bfb2",
              "secondary-fixed": "#ffdbd0",
              "primary-fixed": "#ffdbcd",
              "inverse-surface": "#efdfd9",
              "background": "#19120f",
              "on-secondary-fixed-variant": "#603f34",
              "tertiary-container": "#291a00",
              "tertiary-fixed": "#ffdead",
              "secondary-fixed-dim": "#ebbcad",
              "on-secondary": "#46291f",
              "error": "#ffb4ab",
              "surface": "#19120f",
              "primary": "#e2bfb2",
              "surface-bright": "#413733",
              "on-primary": "#412b22",
              "on-error-container": "#ffdad6",
              "on-error": "#690005",
              "outline": "#9c8e89",
              "on-surface": "#efdfd9",
              "surface-container": "#261e1a",
              "on-surface-variant": "#d3c3be",
              "primary-container": "#2b1810",
              "on-background": "#efdfd9",
              "secondary-container": "#624136",
              "outline-variant": "#4f4440",
              "surface-dim": "#19120f",
              "on-tertiary-container": "#a77e36",
              "surface-container-low": "#221a17",
              "on-primary-fixed": "#2a170f",
              "surface-container-lowest": "#140d0a",
              "surface-container-high": "#312825",
              "inverse-primary": "#73584e",
              "on-primary-container": "#9c7e73",
              "primary-fixed-dim": "#e2bfb2",
              "surface-variant": "#3c332f",
              "on-tertiary": "#432c00",
              "tertiary-fixed-dim": "#efbf70",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Epilogue"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #19120f;
        color: #efdfd9;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(38, 30, 26, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .gold-shimmer {
        background: linear-gradient(135deg, #efbf70 0%, #a77e36 100%);
      }
      .liquid-mask {
        mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      }
      html {
        background-color: #19120f;
      }
      body, #root {
        height: 100%;
        background-color: #19120f;
        width: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
