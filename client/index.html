<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <title>BALPRO LIFE | Chocolate Nutrition, Reimagined</title>
    <!-- Fonts: Epilogue (headline), Plus Jakarta Sans (body), Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Tailwind is built by Vite/PostCSS during development and production. -->
    <style>
      body {
        background-color: #19120f;
        color: #efdfd9;
        overflow-x: hidden;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(38, 30, 26, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .gold-shimmer {
        background: linear-gradient(135deg, #efbf70 0%, #a77e36 100%);
      }
      .liquid-mask {
        mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
      }
      html {
        background-color: #19120f;
      }
      body, #root {
        height: 100%;
        background-color: #19120f;
        width: 100%;
        margin: 0;
        padding: 0;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
